name: Actualizar podcasts

on:

  workflow_dispatch:

  schedule:
    - cron: '0 6 * * *'

jobs:

  update:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node scripts/update.js

      - name: Commit cambios

        run: |

          git config user.name "GitHub Actions"

          git config user.email "actions@github.com"

          git add episodes.json

          git diff --cached --quiet || git commit -m "Actualización automática"

          git push
